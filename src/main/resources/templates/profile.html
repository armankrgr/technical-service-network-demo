<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${lang}" th:dir="${dir}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${tech.displayName(lang)}">Profile</title>
    <script th:src="@{/js/htmx.min.js}"></script>
    <script th:src="@{/js/app.js}"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<main>
    <section class="profile-head">
        <div class="profile-title">
            <div class="avatar" th:text="${#strings.substring(tech.displayName(lang),0,1)}">ر</div>
            <div>
                <h1 th:text="${tech.displayName(lang)}">نام</h1>
                <p th:text="${tech.category(lang)} + ' • ' + ${tech.city(lang)}">دسته</p>
                <span class="badge" th:if="${tech.verified}" th:text="${ui.t(lang,'verified')}">verified</span>
            </div>
        </div>
        <div class="score">
            <span th:text="${ratingStars}">★★★★★</span>
            <b th:text="${#numbers.formatDecimal(tech.ratingAverage,1,1)}">4.8</b>
        </div>
    </section>

    <div class="two-col">
        <section>
            <h2 th:if="${lang == 'fa'}">درباره متخصص</h2>
            <h2 th:if="${lang == 'en'}">About</h2>
            <p th:text="${tech.bio(lang)}">bio</p>
            <div class="tags"><span th:each="skill : ${tech.skills(lang)}" th:text="${skill}">skill</span></div>
            <div class="profile-stats">
                <span><b th:text="${tech.completedJobs}">10</b><small th:text="${lang == 'fa' ? 'کار انجام شده' : 'completed jobs'}">کار</small></span>
                <span><b th:text="${tech.distanceKm}">3</b><small>km</small></span>
                <span><b th:text="${tech.availableSlotCount}">4</b><small th:text="${lang == 'fa' ? 'زمان آزاد' : 'open slots'}">زمان آزاد</small></span>
            </div>
            <p class="muted" th:text="${lang == 'fa' ? 'هزینه تقریبی: ' + tech.approximateFee(lang) : 'Approximate fee: ' + tech.approximateFee(lang)}">fee</p>

            <div th:replace="~{fragments/booking-panel :: bookingPanel}"></div>
        </section>
        <section>
            <div id="reviews" th:replace="~{fragments/reviews :: reviews}"></div>
        </section>
    </div>
</main>
</body>
</html>
