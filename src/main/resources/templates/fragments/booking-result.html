<div xmlns:th="http://www.thymeleaf.org" th:fragment="bookingResult" class="success-box">
    <h3 th:text="${lang == 'fa' ? 'درخواست ثبت شد' : 'Request submitted'}">ثبت شد</h3>
    <p><b>ID:</b> <span th:text="${request.id}">REQ</span></p>
    <p><b th:text="${lang == 'fa' ? 'زمان:' : 'Time:'}">زمان:</b> <span th:text="${T(ir.university.technicalservice.FormattersKt).ui(request.slotStart)}">time</span></p>
    <div class="hero-actions">
        <a class="btn small" th:href="@{/calendar/{id}.ics(id=${request.id})}" th:text="${lang == 'fa' ? 'دانلود فایل تقویم' : 'Download .ics'}">ics</a>
        <a class="btn small ghost" th:href="${googleUrl}" target="_blank" rel="noopener" th:text="${lang == 'fa' ? 'افزودن به Google Calendar' : 'Add to Google Calendar'}">google</a>
    </div>
</div>
